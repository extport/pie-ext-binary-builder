name: 'PIE Pre-Packaged Binary Action'
description: 'Build and upload a PIE pre-packaged binary with the expected naming conventions.'
inputs:
  configure-flags:
    description: 'Flags to pass to ./configure'
    required: false
    default: ''
  build-path:
    description: 'Path to the extension source directory containing config.m4 (relative to repo root)'
    required: false
    default: '.'
  release-tag:
    description: 'The tag to use for the release'
    required: true
  github-token:
    description: 'The GitHub token to use for uploading assets'
    required: true
  docker-image:
    description: 'Docker image to run the build inside (e.g. php:8.2-cli-alpine). When set, build and PHP detection run inside this container via docker run.'
    required: false
    default: ''
  apk-packages:
    description: 'Additional Alpine packages to install when building with a Docker image (space-separated)'
    required: false
    default: ''
outputs:
  package-path:
    description: 'Path to the generated .zip package'
runs:
  using: 'node22'
  main: dist/index.js
